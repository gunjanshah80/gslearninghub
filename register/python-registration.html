<section class="registration-section">
    <div class="form-container">
        <h2>Hands-on Python Workshop Registration</h2>

        <p>
            Python Workshop based on the concept of <b>“Learning by Doing”</b> for students.
            In this practical and interactive workshop, students will develop a mini-project
            while learning Python through hands-on coding.
        </p>

        <form action="YOUR_FORM_BACKEND_URL" method="POST">

            <h3>Student Details</h3>

            <label>Student Name *</label>
            <input type="text" name="student_name" required>

            <label>Age *</label>
            <select name="age" required>
                <option value="">Select Age</option>
                <option>15</option>
                <option>16</option>
                <option>17</option>
                <option>18</option>
                <option>19</option>
                <option>20</option>
                <option>21</option>
                <option>21 Above</option>
            </select>

            <label>Class / Education Level *</label>
            <select name="class_name" required>
                <option value="">Select Class</option>
                <option>Class 9</option>
                <option>Class 10</option>
                <option>Class 11</option>
                <option>Class 12</option>
                <option>Undergraduate (UG) Student</option>
                <option>Other</option>
            </select>

            <label>Python Programming Experience *</label>
            <select name="python_experience" required>
                <option value="">Select Rating</option>
                <option>1 - No Experience</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
                <option>6</option>
                <option>7</option>
                <option>8</option>
                <option>9</option>
                <option>10 - Highly Experienced</option>
            </select>

            <label>Coding / Programming Experience *</label>
            <select name="coding_experience" required>
                <option value="">Select Rating</option>
                <option>1 - Beginner / No Experience</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
                <option>6</option>
                <option>7</option>
                <option>8</option>
                <option>9</option>
                <option>10 - Highly Experienced</option>
            </select>

            <h3>Parent / Guardian Details</h3>

            <label>Parent / Guardian Name *</label>
            <input type="text" name="parent_name" required>

            <label>Mobile Number *</label>
            <input type="tel" name="mobile_number" pattern="[0-9]{10}" required>

            <button type="submit">Submit Registration</button>
        </form>
    </div>
</section>
